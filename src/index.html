<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovelGen AI</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div id="toast-container"></div>
    <div class="app-container">
      <!-- Sidebar Settings -->
      <aside class="sidebar">
        <h1 class="app-title">🖋️ NovelGen AI</h1>
        
        <div class="card settings-group">
          <h2>🛠️ API SETTINGS</h2>
          
          <div class="input-group provider-toggle">
            <label>Provider</label>
            <div class="segmented-control">
              <input type="radio" id="prov-lmstudio" name="provider" value="LM Studio" checked>
              <label for="prov-lmstudio">LM Studio</label>
              
              <input type="radio" id="prov-google" name="provider" value="Google">
              <label for="prov-google">Google</label>
            </div>
          </div>

          <div class="input-group">
            <label for="api-base">Endpoint URL</label>
            <input id="api-base" class="inputbox" value="http://localhost:1234/v1" />
          </div>

          <div class="input-group" id="group-api-key" style="display:none;">
            <label for="api-key">Google API Key</label>
            <input id="api-key" type="password" class="inputbox" placeholder="Enter API Key" />
          </div>

          <div class="input-group">
            <div class="label-header">
              <label for="model-name">Model Name</label>
              <span id="api-status" class="status-msg"></span>
            </div>
            <div class="auto-flex">
              <select id="model-name" class="inputbox" style="flex-grow: 1;">
                <option value="unsloth/gemma-4-31b-it">unsloth/gemma-4-31b-it</option>
                <option value="unsloth/gemma-4-26b-a4b-it">unsloth/gemma-4-26b-a4b-it</option>
                <option value="qwen/qwen3.5-35b-a3b">qwen/qwen3.5-35b-a3b</option>
                <option value="qwen3.5-27b">qwen3.5-27b</option>
              </select>
              <button id="refresh-models-btn" class="btn btn-icon" title="Refresh Models">🔄</button>
            </div>
          </div>
        </div>

        <div class="card settings-group">
          <h2>🎭 PERSONA & PROMPT</h2>
          <div class="input-group">
            <label for="system-preset">System Preset</label>
            <select id="system-preset" class="inputbox">
              <option value="Custom (File Default)">Custom (File Default)</option>
              <option value="Standard / Literary Fiction">Standard / Literary Fiction</option>
              <option value="Web Novel / Light Novel">Web Novel / Light Novel</option>
              <option value="Epic / Dark Fantasy">Epic / Dark Fantasy</option>
              <option value="Romance / Emotional Drama">Romance / Emotional Drama</option>
              <option value="Sci-Fi / Thriller">Sci-Fi / Thriller</option>
            </select>
          </div>
          <div class="input-group">
            <div class="label-header">
              <label for="system-prompt">System Prompt Details</label>
              <div class="auto-flex">
                <span id="prompt-status-msg" class="status-msg"></span>
                <button id="save-prompt-btn" class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.75rem; height: 28px;">💾 Save Prompt</button>
              </div>
            </div>
            <textarea id="system-prompt" class="inputbox textarea-small" rows="4"></textarea>
          </div>

        </div>

        <div class="card settings-group">
          <h2>⚙️ GENERATION PARAMS</h2>
          
          <div class="input-group provider-toggle">
            <label>Language</label>
            <div class="segmented-control">
              <input type="radio" id="lang-ko" name="language" value="Korean" checked>
              <label for="lang-ko">Korean</label>
              <input type="radio" id="lang-jp" name="language" value="Japanese">
              <label for="lang-jp">Japanese</label>
              <input type="radio" id="lang-en" name="language" value="English">
              <label for="lang-en">English</label>
            </div>
          </div>

          <div class="auto-flex">
            <div class="input-group">
              <label for="num-chapters">Total Chapters</label>
              <input type="number" id="num-chapters" class="inputbox" value="5" min="1" max="100" />
            </div>
            <div class="input-group">
              <label for="target-tokens">Target Tokens</label>
              <input type="number" id="target-tokens" class="inputbox" value="2000" min="500" step="500" />
            </div>
          </div>

          <details class="advanced-params">
            <summary>📐 Advanced Sampling Params</summary>
            <div class="collapsible-content">
              <div class="input-group">
                <label for="temperature">Temperature (<span id="temp-val">1.0</span>)</label>
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="1.0" class="slider" />
              </div>
              <div class="input-group">
                <label for="top-p">Top-P (<span id="topp-val">0.95</span>)</label>
                <input type="range" id="top-p" min="0" max="1" step="0.05" value="0.95" class="slider" />
              </div>
              <div class="input-group">
                <label for="repetition-penalty">Repetition Penalty (<span id="rp-val">1.1</span>)</label>
                <input type="range" id="repetition-penalty" min="1" max="2" step="0.05" value="1.1" class="slider" />
              </div>
            </div>
          </details>
        </div>

        <div class="card settings-group">
          <h2>📦 BATCH MODE</h2>
          <div class="auto-flex">
            <div class="input-group">
              <label for="batch-count">Batch Count</label>
              <input type="number" id="batch-count" class="inputbox" value="1" min="1" />
            </div>
            <div class="input-group">
              <label>Queue Size</label>
              <input type="text" id="queue-count" class="inputbox" value="0" readonly style="background:var(--bg-card); cursor:not-allowed;" />
            </div>
          </div>
          <div class="auto-flex" style="margin-top: 5px; gap: 8px;">
            <button id="batch-start-btn" class="btn btn-magic pulse-hover" style="flex: 1;">🚀 Batch Start</button>
            <button id="batch-stop-btn" class="btn btn-danger" style="flex: 1;">⏹️ Stop Queue</button>
          </div>
        </div>

      </aside>
      <div class="resizer" id="sidebar-resizer"></div>
      <!-- Main Content -->
      <main class="main-content">
        <!-- 1. Seed & Plot -->
        <section class="card content-section">
          <div class="tabs-container" data-for="plot-seed">
            <div class="tabs-header">
              <span class="tab-label">Seed</span>
              <button class="tab-btn active" data-tab="edit">✍️ Edit</button>
              <button class="tab-btn" data-tab="preview">👁️ Preview</button>
              <div class="spacer"></div>
              <div class="fs-control">
                <label>SIZE <span id="seed-fs-val">16</span></label>
                <input type="range" id="seed-fs-slider" min="12" max="32" step="1" value="16" class="header-slider" />
              </div>
            </div>
            <div class="tab-content">
              <div class="tab-pane active" data-pane="edit">
                <textarea id="plot-seed" class="inputbox textarea-seed" rows="3" placeholder="Enter the core novel idea or auto-generate..." spellcheck="false"></textarea>
              </div>
              <div class="tab-pane" data-pane="preview">
                <div id="plot-seed-preview" class="markdown-body inputbox textarea-seed"></div>
              </div>
            </div>
          </div>
          <button id="auto-seed-btn" class="btn btn-magic" style="margin-top: 8px; width: 100%;">🎲 Auto Seed</button>
          
          <div class="action-bar">
            <button class="btn btn-primary" id="btn-gen-plot">✨ Generate Plot Outline</button>
            <button class="btn btn-secondary" id="btn-refine-plot">✨ Refine Plot</button>
            <button class="btn btn-danger" id="btn-stop-plot">⏹️ Stop</button>
          </div>
          
          <div class="plot-management auto-flex" style="margin-top: 12px; flex-wrap: nowrap;">
            <select id="saved-plots" class="inputbox" style="flex: 1; min-width: 150px;">
              <option value="" disabled selected>Select a saved plot...</option>
            </select>
            <button class="btn btn-secondary" id="btn-load-plot" style="flex-shrink: 0;">📂 Load</button>
            <button class="btn btn-secondary" id="btn-refresh-plots" style="flex-shrink: 0;">🔄 Refresh</button>
            <button class="btn btn-secondary" id="btn-save-plot" style="flex-shrink: 0;">💾 Save Plot</button>
          </div>
          <div class="status-bar">
            <span>Status: </span><span id="plot-status-msg" class="novel-status-text">Idle</span>
          </div>

          <div class="tabs-container flex-grow" data-for="plot-content">
            <div class="tabs-header">
              <span class="tab-label">Plot</span>
              <button class="tab-btn active" data-tab="edit">✍️ Edit</button>
              <button class="tab-btn" data-tab="preview">👁️ Preview</button>
              <div class="spacer"></div>
              <div class="fs-control">
                <label>SIZE <span id="plot-fs-val">16</span></label>
                <input type="range" id="plot-fs-slider" min="12" max="32" step="1" value="16" class="header-slider" />
              </div>
            </div>
            <div class="tab-content flex-grow" style="display: flex; flex-direction: column;">
              <div class="tab-pane active" data-pane="edit">
                <textarea id="plot-content" class="inputbox textarea-plot" rows="8" placeholder="Generated plot will appear here. You can manually edit it before generating the novel." spellcheck="false"></textarea>
              </div>
              <div class="tab-pane" data-pane="preview">
                <div id="plot-content-preview" class="markdown-body inputbox textarea-plot"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- 2. Novel Generation -->
        <section class="card content-section flex-grow">
          <div class="section-header">
            <div class="action-bar header-actions">
              <button class="btn btn-primary pulse-hover" id="btn-gen-novel">🚀 Start Novel Generation</button>
              <button class="btn btn-danger" id="btn-stop-novel">⏹️ Stop</button>
              <button class="btn btn-ghost" id="btn-clear-novel" title="Clear current novel content">🗑️ Clear</button>
              
              <div class="auto-flex" style="align-items: center; gap: 8px; border: 1px solid var(--border-color); padding: 2px 8px; border-radius: 8px; background: rgba(0,0,0,0.02);">
                <label for="resume-chapter" style="white-space: nowrap; margin-bottom: 0; font-size: 0.85rem; font-weight: 600;">Chapter</label>
                <input type="number" id="resume-chapter" class="inputbox" value="1" min="1" style="width: 60px; height: 32px; padding: 2px 8px;" />
                <button id="find-ch-btn" class="btn btn-secondary" title="Auto-detect next chapter from main text" style="height: 32px; padding: 0 10px; font-size: 0.85rem;">🔍 detect</button>
              </div>

              <button class="btn btn-secondary" id="open-out-folder-btn">📂 Open Output Folder</button>
            </div>
          </div>
          <div class="status-bar">
            <span>Status: </span><span id="novel-status" class="novel-status-text">Idle</span>
          </div>
          <div class="tabs-container flex-grow" data-for="novel-content">
            <div class="tabs-header">
              <span class="tab-label">Novel</span>
              <button class="tab-btn active" data-tab="edit">✍️ Edit</button>
              <button class="tab-btn" data-tab="preview">👁️ Preview</button>
              <div class="spacer"></div>
              <div class="fs-control">
                <label>SIZE <span id="novel-fs-val">16</span></label>
                <input type="range" id="novel-fs-slider" min="12" max="32" step="1" value="16" class="header-slider" />
              </div>
            </div>
            <div class="tab-content flex-grow" style="display: flex; flex-direction: column;">
              <div class="tab-pane active" data-pane="edit">
                <textarea id="novel-content" class="inputbox textarea-novel" readonly placeholder="The generated novel will stream here..."></textarea>
              </div>
              <div class="tab-pane" data-pane="preview">
                <div id="novel-content-preview" class="markdown-body inputbox textarea-novel"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div class="modal-box">
        <h3 id="modal-title">Confirm</h3>
        <p id="modal-message">Are you sure?</p>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-confirm" class="btn btn-danger">Confirm</button>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
